services:
  confluence:
    image: atlassian/confluence:8.5-ubuntu-jdk17
    ports:
      - "8090:8090"
    environment:
      ATL_JDBC_URL: jdbc:postgresql://confluence-db:5432/confluence
      ATL_JDBC_USER: confluence
      ATL_JDBC_PASSWORD: confluence
      ATL_DB_TYPE: postgresql
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 2048m
    volumes:
      - confluence_data:/var/atlassian/application-data/confluence
    depends_on:
      confluence-db:
        condition: service_healthy

  confluence-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: confluence
      POSTGRES_USER: confluence
      POSTGRES_PASSWORD: confluence
    volumes:
      - confluence_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confluence"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  confluence_data:
  confluence_db_data:
