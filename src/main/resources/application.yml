spring:
  application:
    name: confluence-rag
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        timeout: 60s
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3}
        options:
          temperature: 0.3
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        collection-name: confluence-chunks
        initialize-schema: true

ingestion:
  chunk-size: ${CHUNK_SIZE:500}
  chunk-overlap: ${CHUNK_OVERLAP:50}
  batch-size: ${BATCH_SIZE:20}

confluence:
  base-url: ${CONFLUENCE_BASE_URL:http://localhost:8090}
  pat: ${CONFLUENCE_PAT:}
  username: ${CONFLUENCE_USERNAME:}
  password: ${CONFLUENCE_PASSWORD:}
  spaces: ${CONFLUENCE_SPACES:}
  sync:
    cron: "0 */30 * * * *"
    enabled: false
    state-file: ${SYNC_STATE_FILE:./data/sync-state.json}

server:
  port: 8080
  tomcat:
    connection-timeout: -1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
