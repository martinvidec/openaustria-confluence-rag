spring:
  application:
    name: confluence-rag

# Platzhalter — werden in Issue #2 vollständig befüllt
confluence:
  base-url: ${CONFLUENCE_BASE_URL:http://localhost:8090}
  pat: ${CONFLUENCE_PAT:}
  spaces: ${CONFLUENCE_SPACES:}
  sync:
    cron: "0 */30 * * * *"
    enabled: false
    state-file: ${SYNC_STATE_FILE:./data/sync-state.json}

server:
  port: 8080
