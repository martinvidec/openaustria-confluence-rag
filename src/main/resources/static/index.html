<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confluence RAG Chat</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title">
                <h1>Confluence RAG Chat</h1>
                <span id="model-badge" class="model-badge"></span>
            </div>
            <div class="header-actions">
                <div id="space-filter" class="space-filter"></div>
                <button id="sync-btn" class="sync-btn" title="Confluence-Daten synchronisieren">Sync</button>
                <button id="admin-toggle" class="admin-toggle-btn" title="Admin-Panel">&#9881;</button>
            </div>
        </header>

        <div id="admin-panel" class="admin-panel hidden">
            <div class="admin-header">
                <span>Admin</span>
                <button id="admin-close" class="admin-close-btn">&#10005;</button>
            </div>
            <div id="job-progress" class="job-progress hidden">
                <div class="job-progress-header">
                    <span id="job-progress-phase" class="job-progress-phase"></span>
                    <span id="job-progress-percent" class="job-progress-percent"></span>
                </div>
                <div class="progress-bar-container">
                    <div id="job-progress-bar" class="progress-bar"></div>
                </div>
                <div id="job-progress-detail" class="job-progress-detail"></div>
                <div class="job-progress-stats">
                    <span id="job-progress-chunks"></span>
                    <span id="job-progress-errors"></span>
                </div>
            </div>
            <div id="admin-spaces" class="admin-spaces"></div>
            <div class="admin-global-actions">
                <button id="sync-all-btn" class="admin-btn">Alle Spaces syncen</button>
                <button id="ingest-all-btn" class="admin-btn danger-btn">Alle Spaces neu ingesten</button>
            </div>
        </div>

        <main id="message-list" class="message-list"></main>

        <footer class="chat-input-area">
            <form id="chat-form" class="chat-form">
                <input
                    type="text"
                    id="chat-input"
                    class="chat-input"
                    placeholder="Stelle eine Frage zur Confluence-Dokumentation..."
                    autocomplete="off"
                >
                <button type="submit" id="send-btn" class="send-btn">Senden</button>
            </form>
        </footer>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/js/marked.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
