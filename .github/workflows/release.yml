name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # actions/setup-java hits a broken JDK tool-cache on current runners
    # ("Error loading java.security file"). We install JDK + Maven via
    # apt directly and unset any Java env vars the runner may set that
    # would interfere with JVM startup.
    env:
      JAVA_TOOL_OPTIONS: ''
      _JAVA_OPTIONS: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 17, Maven, zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            openjdk-17-jdk-headless maven zip
          unset JAVA_HOME
          java -version
          mvn -version

      - name: Build Fat JAR
        run: mvn -B package -DskipTests

      - name: Assemble distribution archives
        run: ./packaging/assemble.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/confluence-rag-*-unix.tar.gz
            dist/confluence-rag-*-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
