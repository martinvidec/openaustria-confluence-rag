name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # actions/setup-java hits a broken JDK tool-cache on current runners
    # ("Error loading java.security file"). We install JDK + Maven via
    # apt directly and unset any Java env vars the runner may set that
    # would interfere with JVM startup.
    env:
      JAVA_TOOL_OPTIONS: ''
      _JAVA_OPTIONS: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug runner env
        run: |
          echo '--- env (java-related) ---'
          env | grep -iE 'java|jdk|mvn|maven' || true
          echo '--- /etc/environment ---'
          cat /etc/environment || true
          echo '--- java.security files present ---'
          find /usr/lib/jvm /opt/hostedtoolcache/Java* /etc/java* 2>/dev/null -name 'java.security' | head -20 || true
          echo '--- any pre-existing java on PATH ---'
          which java || true
          java -version 2>&1 || true

      - name: Install JDK 17, Maven, zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            openjdk-17-jdk-headless maven zip
          echo '--- after install ---'
          ls -la /usr/lib/jvm/ || true
          ls -la /usr/lib/jvm/java-17-openjdk-amd64/conf/security/java.security || true
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          $JAVA_HOME/bin/java -version
          mvn -version

      - name: Build Fat JAR
        run: mvn -B package -DskipTests

      - name: Assemble distribution archives
        run: ./packaging/assemble.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/confluence-rag-*-unix.tar.gz
            dist/confluence-rag-*-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
