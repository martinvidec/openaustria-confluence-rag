name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        # Using 21 instead of 17 — the 17.0.18-8 build currently resolved
        # by setup-java is broken ('Error loading java.security file').
        # pom.xml still targets Java 17 bytecode via maven-compiler.
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Fat JAR
        run: mvn -B package -DskipTests

      - name: Assemble distribution archives
        run: ./packaging/assemble.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/confluence-rag-*-unix.tar.gz
            dist/confluence-rag-*-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
