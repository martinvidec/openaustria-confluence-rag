name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Build happens inside a Maven+Temurin container to bypass the
    # broken JDK tool-cache on the current hosted runners.
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-17
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip (for assemble.sh windows archive)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends zip

      - name: Build Fat JAR
        run: mvn -B package -DskipTests

      - name: Assemble distribution archives
        run: ./packaging/assemble.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/confluence-rag-*-unix.tar.gz
            dist/confluence-rag-*-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
